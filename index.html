    <!-- 域名跳转逻辑：内嵌脚本，在头部解析 -->
    <script>
        (function() {
            // 新域名
            const NEW_DOMAIN = 'https://xmc3497.top';
            // 获取当前页面的referrer
            var referrer = document.referrer || '';
            // 定义旧域名的标识 (从xmc3497.top 任何页面跳转过来)
            // 注意：如果是从 https://xmc3497.top 或 http://xmc3497.top 等子路径过来
            var isFromOldDomain = false;
            try {
                if (referrer) {
                    var referrerUrl = new URL(referrer);
                    var hostname = referrerUrl.hostname;
                    // 匹配主域名 xmc3497.top
                    if (hostname === 'xmc3497.top' || hostname === 'xmc3497.top') {
                        isFromOldDomain = true;
                    }
                }
            } catch (e) {
                // 解析失败则忽略
            }

            // 如果是从旧域过来的，立即跳转，不进行任何加载
            if (isFromOldDomain) {
                // 直接替换，不让页面继续加载
                window.location.replace(NEW_DOMAIN);
                // 停止后续执行 (但后续代码仍可能执行，不过跳转会中断)
                // 为了保险，抛出一个错误或停止渲染，但通常跳转足够
                // 我们可以尝试停止后续脚本，但最简单的是直接替换后不再执行后续
                // 由于是内联脚本，后面的代码仍会解析，但跳转会立刻发生，通常不会影响
                // 但为了完全避免闪屏，可以停止进一步渲染，但无法阻止HTML解析。
                // 加一个死循环？不推荐。跳转已经足够。
            }

            // 如果不是从旧域过来，我们需要在页面完全加载后弹出提示框
            // 将弹出逻辑放在window.load事件中，但必须确保不被立即执行跳转干扰
            // 同时保留原有所有的功能
            window.addEventListener('load', function() {
                // 如果是从旧域跳转，我们已经在上面跳转了，不会走到这里（但以防万一跳转慢，加标志判断）
                // 但变量 isFromOldDomain 在闭包里，这里可以拿到
                if (isFromOldDomain) {
                    // 如果因为某些原因跳转没发生（例如浏览器阻止），可以再次尝试
                    // 但为了避免循环，检查一下当前域名是不是已经是新域
                    if (window.location.hostname !== 'xmc3497.top' && window.location.hostname !== 'xmc3497.top') {
                        window.location.replace(NEW_DOMAIN);
                    }
                    return;
                }

                // 原有load逻辑 (延迟加载动画等)
                // 注意：原有load内也有初始化，我们需完全保留，但需要将我们的弹窗逻辑整合进去
                // 为了不破坏原有逻辑，我们重写load? 最好保留原有监听，再添加一个额外的。
                // 但页面中原有 window.addEventListener('load', ...) 在底部，会被执行两次吗？ 
                // 为了避免冲突，我们将原有load内容移到一个函数，并在这里一起调用。
                // 但由于不能删除原有代码（保留原样），我们可以在保留原监听的同时，在这里再挂载一个。
                // 但原代码在底部也有load监听，两个都会执行。原代码中有setTimeout隐藏loader等，我们需要让弹窗在loader之后出现。
                // 简单方案：把弹窗逻辑放在原有load之后，但用setTimeout确保loader执行完毕。
                // 更稳健：直接修改原有load函数，在里面追加逻辑。但题目要求“如果这个页面是从...跳转过来...如果不是，等待页面加载完成之后弹出提示框”，
                // 同时要求“其他原有功能保留”。我们可以在保留原有load监听的同时，额外增加一个load监听来处理弹窗。
                // 但这样原load里的隐藏loader等会先执行，然后执行我们的弹窗，不会冲突。
                // 但原load中也有自定义鼠标等，完全保留。我们只需再加一个监听即可。
                // 为了防止弹窗被loader覆盖，等loader隐藏后出现（loader隐藏延迟1500ms），我们可以在loader隐藏后出现，或者直接在load时就弹。
                // 因为loader是半透明覆盖，弹窗在它之上（z-index更高），所以没问题。
                // 因此我们加一个新的load监听。
            });

            // 为了避免重复，我们将弹窗逻辑放在一个单独的load监听中，且确保只执行一次。
            // 但上面已经有load内判断，我们再用addEventListener添加一个。
            // 注意：原有代码底部也有一个load监听，因此这里再加一个，总共三个（原有，上面内嵌的load，和下面这个）。
            // 但上面内嵌的load里我们写了部分逻辑，需要完整提取。为了清晰，我们统一在页面底部处理。
            // 因为代码执行顺序：head内优先，然后body内容，最后底部script。
            // 底部原有load监听，我们将在其之后附加一个新的监听，或者修改原有。
            // 但题目要求不能删除原有代码，但可以在后面添加新逻辑。我们就在底部原有script之后，再加一段脚本，用于处理弹窗。
            // 并且要确保弹窗只触发一次。
        })();
    </script>

    <!-- 原有底部script (完全保留，不做任何修改) -->
    <script>
        // Toast提示功能
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        // 搜索功能处理
        function handleSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if (query) {
                window.location.href = `XMCoffice/Download.html?search=${encodeURIComponent(query)}`;
            } else {
                showToast('请输入搜索内容');
            }
        }
        // 页面加载完成后执行
        window.addEventListener('load', function() {
            // 隐藏加载动画
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.classList.add('hidden');
            }, 1500);
            // 初始化打字效果
            const typingText = document.getElementById('typing-text');
            const text = "XMC工作室";
            let index = 0;
            
            function type() {
                if (index < text.length) {
                    typingText.textContent += text.charAt(index);
                    index++;
                    setTimeout(type, 150);
                } else {
                    // 打字完成后添加光标
                    const cursor = document.createElement('span');
                    cursor.className = 'cursor';
                    typingText.appendChild(cursor);
                }
            }
            
            // 延迟开始打字效果
            setTimeout(type, 1800);
            // 自定义鼠标效果
            const cursor = document.getElementById('cursor');
            const cursorOuter = document.getElementById('cursor-outer');
            
            document.addEventListener('mousemove', (e) => {
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                
                cursorOuter.style.left = e.clientX - 15 + 'px';
                cursorOuter.style.top = e.clientY - 15 + 'px';
            });
            
            // 点击效果
            document.addEventListener('click', function(event) {
                // 创建点击动画元素
                const clickEffect = document.createElement('div');
                clickEffect.style.position = 'fixed';
                clickEffect.style.left = (event.clientX - 25) + 'px';
                clickEffect.style.top = (event.clientY - 25) + 'px';
                clickEffect.style.width = '50px';
                clickEffect.style.height = '50px';
                clickEffect.style.background = 'url(click.gif) no-repeat center';
                clickEffect.style.backgroundSize = 'contain';
                clickEffect.style.pointerEvents = 'none';
                clickEffect.style.zIndex = '9999';
                document.body.appendChild(clickEffect);
                
                // 移除动画元素
                setTimeout(() => {
                    if (document.body.contains(clickEffect)) {
                        document.body.removeChild(clickEffect);
                    }
                }, 500);
            });
            // 移动端菜单切换
            const menuToggle = document.getElementById('menuToggle');
            const navLinks = document.getElementById('navLinks');
            
            menuToggle.addEventListener('click', () => {
                navLinks.classList.toggle('active');
            });
            // 搜索功能
            const searchInput = document.getElementById('searchInput');
            const searchBtn = document.getElementById('searchBtn');
            
            searchBtn.addEventListener('click', handleSearch);
            
            // 按回车键搜索
            searchInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    handleSearch();
                }
            });
            
            // 加载logo图片
            const logoElement = document.getElementById('logo');
            // 这里可以替换为您自己的logo API链接
            const logoUrl = 'https://www.now61.cn/f/Bxg7ip/icon-compressed.png';
            const logoImg = new Image();
            logoImg.onload = function() {
                logoElement.style.backgroundImage = `url(${logoUrl})`;
                logoElement.style.backgroundSize = 'cover';
                logoElement.textContent = '';
            };
            logoImg.onerror = function() {
                // 如果图片加载失败，显示默认logo
                logoElement.textContent = 'XMC';
                logoElement.style.background = 'linear-gradient(135deg, #00a8ff, #0097e6)';
            };
            logoImg.src = logoUrl;
        });
    </script>

    <!-- 新增域名迁移弹窗逻辑 (必须保留原功能，且不干扰原有代码) -->
    <script>
        (function() {
            const NEW_DOMAIN = 'https://xmc3497.top';
            let isFromOld = false;
            try {
                const referrer = document.referrer;
                if (referrer) {
                    const url = new URL(referrer);
                    const host = url.hostname;
                    if (host === 'xmc3497.top' || host === 'xmc3497.top') {
                        isFromOld = true;
                    }
                }
            } catch (e) {}

            // 如果是来自旧域名，立即跳转（再次确保，因为上面head里可能已执行，但防止执行顺序问题）
            if (isFromOld) {
                // 如果当前页面还没跳转（可能被某些因素打断），强制跳转
                if (window.location.hostname !== 'xmc3497.top' && window.location.hostname !== 'xmc3497.top') {
                    window.location.replace(NEW_DOMAIN);
                }
                return; // 停止执行后续弹窗逻辑
            }

            // 如果不是来自旧域，等待页面完全加载后弹出提示框
            function showDomainModal() {
                // 避免重复弹窗
                if (document.getElementById('domainModal')) return;

                const modal = document.createElement('div');
                modal.id = 'domainModal';
                modal.className = 'domain-modal';
                modal.innerHTML = `
                    <div class="domain-modal-content">
                        <p>网站已移至新域名xmc3497.top，本站将停止维护！<br>是否跳转？</p>
                        <div class="domain-modal-buttons">
                            <button class="domain-modal-btn btn-confirm" id="modalConfirm">确定</button>
                            <button class="domain-modal-btn btn-cancel" id="modalCancel">取消</button>
                        </div>
                    </div>
                `;
                document.body.appendChild(modal);

                document.getElementById('modalConfirm').addEventListener('click', function() {
                    window.location.href = NEW_DOMAIN;
                });
                document.getElementById('modalCancel').addEventListener('click', function() {
                    modal.remove();
                    // 可额外提示一次（可选）
                    showToast('您选择留在当前页面，但本站将不再维护。');
                });
            }

            // 等待原有load所有任务（包括延迟隐藏loader）完成后再弹窗，避免被loader遮挡
            // 但loader的z-index很高，我们的modal更高（20000），所以不怕。
            // 但为了视觉体验，可以等loader隐藏后（1500ms后）再弹，但要求是“等待页面加载完成之后弹出”，load事件即加载完成。
            window.addEventListener('load', function() {
                // 稍微延迟一点点，让原有动画跑起来，但modal会覆盖在上面，不影响。
                setTimeout(showDomainModal, 100);
            });
        })();
    </script>
